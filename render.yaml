# VantaCrawl / SantaScan — SaaS on Render (Standard)
#
# Concurrent scans: MAX_CONCURRENT_SCANS=8 (raise further in Dashboard if needed).
# Per-user cap: MAX_CONCURRENT_SCANS_PER_USER=1.
#
# Disk is attached only to vantacrawl-api. Render cannot share that disk with the
# Background Worker, so production runs the queue consumer IN the web process
# (EMBED_WORKER=true). Suspend vantacrawl-worker (or leave it unused) so jobs are
# not double-consumed. Revisit a dedicated worker when reports/uploads use object storage.
#
# Set secret env vars in the Dashboard (do not commit real SMTP/admin secrets).
# If the Live service is named differently (e.g. santascan-api), set the same
# env vars there after deploy.
#
# Browser features: build installs Chrome for Testing into CHROME_INSTALL_DIR.
# If that fails, the worker auto-detects and falls back to HTTP-only with one log line.

databases:
  - name: vantacrawl-db
    plan: free
    databaseName: vantacrawl
    user: vantacrawl

services:
  - type: keyvalue
    name: vantacrawl-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: vantacrawl-api
    runtime: python
    plan: standard
    # Keep scan reports across deploys (single instance required with a disk).
    disk:
      name: vantacrawl-data
      mountPath: /opt/render/project/src/web/data
      sizeGB: 10
    buildCommand: |
      bash scripts/install_chrome_linux.sh
      pip install -r web/requirements-render.txt -r web/api/requirements.txt
      cd web/ui && npm install && npm run build
    startCommand: |
      if [ -f "$HOME/.cache/vantacrawl-chrome/chrome_bin.path" ]; then
        export CHROME_BIN="$(cat "$HOME/.cache/vantacrawl-chrome/chrome_bin.path")"
        export CHROMEDRIVER_PATH="$(cat "$HOME/.cache/vantacrawl-chrome/chromedriver.path")"
        export PATH="$(dirname "$CHROMEDRIVER_PATH"):$PATH"
      fi
      if [ -f "${CHROME_INSTALL_DIR}/chrome_bin.path" ]; then
        export CHROME_BIN="$(cat "${CHROME_INSTALL_DIR}/chrome_bin.path")"
        export CHROMEDRIVER_PATH="$(cat "${CHROME_INSTALL_DIR}/chromedriver.path")"
        export PATH="$(dirname "$CHROMEDRIVER_PATH"):$PATH"
      fi
      uvicorn vantacrawl_api.main:app --host 0.0.0.0 --port $PORT --app-dir web/api
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: PYTHONPATH
        value: /opt/render/project/src:/opt/render/project/src/web/api
      - key: EMBED_WORKER
        value: "true"
      - key: MAX_CONCURRENT_SCANS
        value: "8"
      - key: MAX_CONCURRENT_SCANS_PER_USER
        value: "1"
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vantacrawl-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vantacrawl-redis
          type: keyvalue
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DATA_DIR
        value: /opt/render/project/src/web/data
      - key: REPORTS_DIR
        value: /opt/render/project/src/web/data/reports
      - key: JOBS_DIR
        value: /opt/render/project/src/web/data/jobs
      - key: UI_DIST_DIR
        value: /opt/render/project/src/web/ui/dist
      - key: CHROME_INSTALL_DIR
        value: /opt/render/project/src/.cache/vantacrawl-chrome
    # Disk is live on the web service above (10 GB at /opt/render/project/src/web/data).

  # Optional dedicated scan worker — DO NOT run alongside EMBED_WORKER=true.
  # Render disks cannot be shared across services, so reports/uploads would land on
  # the worker's ephemeral FS instead of the API disk. Re-enable only after reports
  # and job uploads use object storage (S3/R2), then set EMBED_WORKER=false on the API.
  #
  # Until then: Suspend vantacrawl-worker in the Dashboard to avoid double consumers
  # and an unused Standard instance charge.
  #
  # - type: worker
  #   name: vantacrawl-worker
  #   runtime: python
  #   plan: standard
  #   ...
